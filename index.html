<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- <link rel="stylesheet" href="index.css"> -->
    <title>To Do List</title>
</head>

<body class="bg-amber-300 ">
    <div class="flex justify-center pt-10">
        <div class="w-md h-80 bg-white self-center flex justify-between ">
            <h3 class="font-mono text-2xl p-8">To Do List</h3>
            <p id="add" class="font-mono text-xl p-8">+</p>
        </div>
        <div id="form" style="display:none;">
            <form action="post">
                <input type="text" name="do" class="border-1 border-dashed font-mono m-4 p-5"
                    placeholder="What do you wanna do?">
                <button id="submit" class="border-2 border-solid m-5 p-3 font-mono text-xl">Add +</button>
            </form>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
