<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- <link rel="stylesheet" href="index.css"> -->
    <title>To Do List</title>
</head>

<body class="bg-amber-300 flex justify-center">
    <div class="w-xl h-auto bg-white mt-15 ml-15">
        <div class="flex justify-center pt-10">
            <div class=" flex justify-between ">
                <h3 class="font-mono text-2xl p-8">To Do List</h3>
                <p id="add" class="font-mono text-xl p-8">+</p>
            </div>


        </div>
        <div class="flex justify-center font-mono text-xl">
            <ul class="tasklist">
                <li> <span class="flex flex-col"> </span></li>
            </ul>
        </div>
        <div id="form" style="display:none;">
            <form action="post">
                <input id="do" type="text" name="do" class="border-1 border-dashed font-mono m-4 p-5"
                    placeholder="What do you wanna do?">
                <button id="submit" class="border-2 border-solid m-2 p-2 font-mono text-xl" onclick="addTask(event)">Add
                    +</button>
                <button type="reset" class="border-2 border-solid m-2 p-2 font-mono text-xl">Clear x</button>
            </form>
        </div>

        <script src="index.js"></script>
</body>

</html>
